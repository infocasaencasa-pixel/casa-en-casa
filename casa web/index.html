<script type="text/plain" id="cec-source">
const { useState, useEffect, useRef } = React;

const ADMIN_UID = "qilDy7Dng1bnORCa7TCJkqLgQq72";

/* ---------- constants ---------- */

const CATEGORIES = [
  { key: "muebles", label: "Muebles", icon: "🪑" },
  { key: "cocina", label: "Cocina y comedor", icon: "🍽️" },
  { key: "electro", label: "Electrodomésticos", icon: "🔌" },
  { key: "textiles", label: "Textiles del hogar", icon: "🧺" },
  { key: "decoracion", label: "Decoración e iluminación", icon: "💡" },
  { key: "jardin", label: "Jardín y exterior", icon: "🌳" },
  { key: "herramientas", label: "Herramientas y herrajes", icon: "🔧" },
  { key: "electronica", label: "Electrónica y entretenimiento", icon: "📺" },
  { key: "otros", label: "Otros objetos del hogar", icon: "🏡" },
];

const ACCENTS = ["moss", "clay", "slate"];

const SUBCATEGORIES = {
  muebles: ["Sofás", "Sillones", "Mesas auxiliares", "Mesas de comedor", "Sillas", "Escritorios", "Burós", "Camas", "Cómodas", "Aparadores", "Mecedoras"],
  cocina: ["Vajillas", "Cubiertos", "Cuchillos", "Cucharas de servir", "Copas", "Vasos", "Ollas", "Sartenes", "Utensilios de cocina", "Manteles", "Recipientes para almacenar"],
  electro: ["Pequeños electrodomésticos", "Cafeteras", "Licuadoras", "Tostadores", "Hornos eléctricos", "Microondas", "Aspiradoras", "Otros aparatos del hogar"],
  textiles: ["Sábanas", "Toallas", "Edredones", "Almohadas", "Cobijas", "Manteles", "Otros textiles"],
  decoracion: ["Lámparas", "Espejos", "Cristal cortado", "Cuadros", "Adornos", "Floreros", "Objetos decorativos"],
  herramientas: ["Cajas de herramientas", "Martillos", "Desarmadores", "Palas", "Herramientas de jardín", "Herrajes", "Otros accesorios"],
  jardin: ["Mesas plegables", "Sillas plegables", "Muebles de exterior", "Accesorios de jardín"],
  electronica: ["Televisiones", "Equipos de sonido", "Aparatos electrónicos"],
};

function categoriaInfo(key) {
  return CATEGORIES.find((c) => c.key === key) || { label: key, icon: "📦" };
}

function formatPrecio(n) {
  const num = Number(n);
  if (!n || isNaN(num)) return "Sin precio";
  return num.toLocaleString("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 0 });
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 900;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.65));
      };
      img.onerror = () => reject(new Error("No se pudo leer la imagen"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
    reader.readAsDataURL(file);
  });
}

/* ---------- Firestore helpers ---------- */

async function fetchCasas() {
  const snap = await window.__cecDb.collection("casas").orderBy("createdAt", "desc").get();
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
}
async function fetchObjetosDeCasa(casaId) {
  const snap = await window.__cecDb.collection("objetos").where("casaId", "==", casaId).get();
  return snap.docs.map((d) => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}
async function fetchObjetosPublicados() {
  const snap = await window.__cecDb.collection("objetos").where("publicado", "==", true).get();
  return snap.docs.map((d) => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}
async function addCasaDoc(data) {
  const ref = await window.__cecDb.collection("casas").add({ ...data, createdAt: Date.now() });
  return ref.id;
}
async function addObjetoDoc(data) {
  const ref = await window.__cecDb.collection("objetos").add({ ...data, createdAt: Date.now() });
  return ref.id;
}
async function updateObjetoDoc(id, patch) {
  await window.__cecDb.collection("objetos").doc(id).update(patch);
}
async function deleteObjetoDoc(id) {
  await window.__cecDb.collection("objetos").doc(id).delete();
}
async function deleteCasaDoc(id) {
  await window.__cecDb.collection("casas").doc(id).delete();
  const snap = await window.__cecDb.collection("objetos").where("casaId", "==", id).get();
  const batch = window.__cecDb.batch();
  snap.docs.forEach((d) => batch.delete(d.ref));
  await batch.commit();
}

/* ---------- root ---------- */

function CasaEnCasa() {
  const [authUser, setAuthUser] = useState(undefined); // undefined = checking, null = logged out
  const [ready, setReady] = useState(false);
  const [casas, setCasas] = useState([]);
  const [objetos, setObjetos] = useState([]); // caché en memoria: se va llenando por casa o por publicados
  const [cargandoObjetos, setCargandoObjetos] = useState(false);
  const [errorCasa, setErrorCasa] = useState("");
  const [stack, setStack] = useState([{ view: "home" }]);
  const [tab, setTab] = useState("casas");
  const [toast, setToast] = useState(null);
  const [loadError, setLoadError] = useState("");

  const screen = stack[stack.length - 1];

  useEffect(() => {
    const unsub = window.__cecAuth.onAuthStateChanged((u) => setAuthUser(u));
    return unsub;
  }, []);

  useEffect(() => {
    if (!authUser) return;
    (async () => {
      try {
        const c = await fetchCasas();
        setCasas(c);
      } catch (e) {
        console.error("Error cargando casas:", e);
        setLoadError("No se pudo conectar con la base de datos. Revisa tu conexión e intenta de nuevo.");
        setReady(true);
        return;
      }
      setReady(true);
    })();
  }, [authUser]);

  function mergeObjetos(lista) {
    setObjetos((prev) => {
      const mapa = new Map(prev.map((o) => [o.id, o]));
      lista.forEach((o) => mapa.set(o.id, o));
      return Array.from(mapa.values());
    });
  }

  async function abrirCasa(casaId) {
    push({ view: "casa", casaId });
    setErrorCasa("");
    setCargandoObjetos(true);
    try {
      const lista = await fetchObjetosDeCasa(casaId);
      mergeObjetos(lista);
      // Autocorrección: si el total guardado en la casa no coincide con lo real, lo arreglamos.
      const casaActual = casas.find((c) => c.id === casaId);
      if (casaActual && casaActual.totalObjetos !== lista.length) {
        setCasas((prev) => prev.map((c) => (c.id === casaId ? { ...c, totalObjetos: lista.length } : c)));
        try {
          await window.__cecDb.collection("casas").doc(casaId).update({ totalObjetos: lista.length });
        } catch (e) { console.error("No se pudo corregir el contador de la casa:", e); }
      }
    } catch (e) {
      console.error(e);
      setErrorCasa("No se pudieron cargar los objetos de esta casa. Detalle: " + (e && e.message ? e.message : String(e)));
    }
    setCargandoObjetos(false);
  }

  async function abrirCatalogoInterno() {
    setTab("catalogo");
    setCargandoObjetos(true);
    try {
      const lista = await fetchObjetosPublicados();
      mergeObjetos(lista);
    } catch (e) { console.error(e);
      notify("No se pudo cargar el catálogo.");
    }
    setCargandoObjetos(false);
  }

  function notify(msg) {
    setToast(msg);
    window.clearTimeout(notify._t);
    notify._t = window.setTimeout(() => setToast(null), 2200);
  }

  function push(view) { setStack((s) => [...s, view]); }
  function pop() { setStack((s) => (s.length > 1 ? s.slice(0, -1) : s)); }
  function goHome() { setStack([{ view: "home" }]); }

  async function crearCasa(nombre, zona) {
    try {
      const ownerId = authUser.uid;
      const id = await addCasaDoc({ nombre, zona, ownerId, totalObjetos: 0 });
      setCasas((prev) => [{ id, nombre, zona, ownerId, totalObjetos: 0, createdAt: Date.now() }, ...prev]);
      notify("Casa creada");
      pop();
    } catch (e) { console.error(e);
      notify("No se pudo guardar la casa. Intenta de nuevo.");
    }
  }

  async function crearObjeto(casaId, categoria, data) {
    const base = { casaId, categoria, publicado: false, vendido: false, ...data };
    try {
      const id = await addObjetoDoc(base);
      setObjetos((prev) => [{ id, ...base, createdAt: Date.now() }, ...prev]);
      setCasas((prev) => prev.map((c) => (c.id === casaId ? { ...c, totalObjetos: (c.totalObjetos || 0) + 1 } : c)));
      try {
        await window.__cecDb.collection("casas").doc(casaId).update({
          totalObjetos: firebase.firestore.FieldValue.increment(1),
        });
      } catch (e) { console.error("No se pudo actualizar el contador de la casa:", e); }
      notify("Objeto guardado");
      pop();
    } catch (e) { console.error(e);
      notify("No se pudo guardar el objeto. Intenta de nuevo.");
    }
  }

  async function actualizarObjeto(id, patch) {
    setObjetos((prev) => prev.map((o) => (o.id === id ? { ...o, ...patch } : o)));
    try {
      await updateObjetoDoc(id, patch);
    } catch (e) { console.error(e);
      notify("No se pudo guardar el cambio. Intenta de nuevo.");
    }
  }

  async function eliminarObjeto(id) {
    const objetoActual = objetos.find((o) => o.id === id);
    try {
      await deleteObjetoDoc(id);
      setObjetos((prev) => prev.filter((o) => o.id !== id));
      if (objetoActual) {
        setCasas((prev) => prev.map((c) => (c.id === objetoActual.casaId ? { ...c, totalObjetos: Math.max(0, (c.totalObjetos || 1) - 1) } : c)));
        try {
          await window.__cecDb.collection("casas").doc(objetoActual.casaId).update({
            totalObjetos: firebase.firestore.FieldValue.increment(-1),
          });
        } catch (e) { console.error("No se pudo actualizar el contador de la casa:", e); }
      }
      notify("Objeto eliminado");
      pop();
    } catch (e) { console.error(e);
      notify("No se pudo eliminar. Intenta de nuevo.");
    }
  }

  async function eliminarCasa(id) {
    try {
      await deleteCasaDoc(id);
      setCasas((prev) => prev.filter((c) => c.id !== id));
      setObjetos((prev) => prev.filter((o) => o.casaId !== id));
      notify("Casa eliminada");
      goHome();
    } catch (e) { console.error(e);
      notify("No se pudo eliminar la casa. Intenta de nuevo.");
    }
  }

  if (authUser === undefined) {
    return (
      <div className="cec-loading">
        <div className="cec-loading-badge">🏠</div>
        <p>Verificando acceso…</p>
      </div>
    );
  }

  if (authUser === null) {
    return <Login />;
  }

  if (!ready) {
    return (
      <div className="cec-loading">
        <div className="cec-loading-badge">🏠</div>
        <p>Abriendo el archivador…</p>
      </div>
    );
  }

  if (loadError) {
    return (
      <div className="cec-loading">
        <div className="cec-loading-badge">⚠️</div>
        <p style={{maxWidth: "28ch", textAlign: "center"}}>{loadError}</p>
      </div>
    );
  }

  return (
    <div className="cec-screen">
      {toast && <div className="cec-toast">{toast}</div>}

      {screen.view === "home" && (
        <Home
          casas={casas}
          objetos={objetos}
          tab={tab}
          onTabCasas={() => setTab("casas")}
          onTabCatalogo={abrirCatalogoInterno}
          onTabIntereses={() => setTab("intereses")}
          onTabSolicitudes={() => setTab("solicitudes")}
          cargando={cargandoObjetos}
          currentUid={authUser.uid}
          isAdmin={authUser.uid === ADMIN_UID}
          onOpenCasa={abrirCasa}
          onNuevaCasa={() => push({ view: "nuevaCasa" })}
          onAbrirObjeto={(id) => push({ view: "objeto", objetoId: id, readOnly: true })}
        />
      )}

      {screen.view === "nuevaCasa" && <NuevaCasa onBack={pop} onCrear={crearCasa} />}

      {screen.view === "casa" && (
        <CasaView
          casa={casas.find((c) => c.id === screen.casaId)}
          objetos={objetos.filter((o) => o.casaId === screen.casaId)}
          cargando={cargandoObjetos}
          error={errorCasa}
          onReintentar={() => abrirCasa(screen.casaId)}
          onBack={pop}
          onHome={goHome}
          onCategoria={(cat) => push({ view: "categoria", casaId: screen.casaId, categoria: cat })}
          onEliminarCasa={() => eliminarCasa(screen.casaId)}
        />
      )}

      {screen.view === "categoria" && (
        <CategoriaView
          categoria={screen.categoria}
          objetos={objetos.filter((o) => o.casaId === screen.casaId && o.categoria === screen.categoria)}
          onBack={pop}
          onAbrir={(id) => push({ view: "objeto", objetoId: id, readOnly: false })}
          onNuevo={() => push({ view: "nuevoObjeto", casaId: screen.casaId, categoria: screen.categoria })}
        />
      )}

      {screen.view === "nuevoObjeto" && (
        <ObjetoForm
          categoria={screen.categoria}
          onBack={pop}
          onGuardar={(data) => crearObjeto(screen.casaId, screen.categoria, data)}
        />
      )}

      {screen.view === "editarObjeto" && (
        <ObjetoForm
          categoria={screen.categoria}
          existente={objetos.find((o) => o.id === screen.objetoId)}
          onBack={pop}
          onGuardar={(data) => {
            actualizarObjeto(screen.objetoId, data);
            notify("Cambios guardados");
            pop();
          }}
        />
      )}

      {screen.view === "objeto" && (
        <ObjetoFicha
          objeto={objetos.find((o) => o.id === screen.objetoId)}
          readOnly={!!screen.readOnly}
          onBack={pop}
          onUpdate={(patch) => actualizarObjeto(screen.objetoId, patch)}
          onDelete={() => eliminarObjeto(screen.objetoId)}
          onEditar={() => {
            const o = objetos.find((x) => x.id === screen.objetoId);
            push({ view: "editarObjeto", objetoId: screen.objetoId, categoria: o.categoria, casaId: o.casaId });
          }}
        />
      )}
    </div>
  );
}

/* ---------- login ---------- */

function Login() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [recuperando, setRecuperando] = useState(false);
  const [recuperado, setRecuperado] = useState(false);

  async function entrar() {
    setErr("");
    setBusy(true);
    try {
      await window.__cecAuth.signInWithEmailAndPassword(email.trim(), password);
    } catch (e) {
      setErr("Correo o contraseña incorrectos.");
    } finally {
      setBusy(false);
    }
  }

  async function recuperarContrasena() {
    if (!email.trim()) {
      setErr("Escribe tu correo arriba primero, y luego dale a \"Olvidé mi contraseña\".");
      return;
    }
    setErr("");
    setBusy(true);
    try {
      await window.__cecAuth.sendPasswordResetEmail(email.trim());
      setRecuperado(true);
    } catch (e) {
      setErr("No se pudo enviar el correo. Revisa que el correo esté bien escrito.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="cec-screen">
    <div className="cec-form" style={{paddingTop: "80px"}}>
      <div className="cec-hero-tab" style={{margin: "0 auto 10px"}}>🔒</div>
      <h1 style={{fontFamily:"'Fraunces',serif", textAlign:"center", fontSize:"24px", margin:"0 0 20px"}}>Acceso de administración</h1>
      <label className="cec-field">
        <span>Correo</span>
        <input type="email" autoFocus value={email} onChange={(e) => setEmail(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && entrar()} />
      </label>
      <label className="cec-field">
        <span>Contraseña</span>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && entrar()} />
      </label>
      {err && <p className="cec-error-text">{err}</p>}
      {recuperado && <p className="cec-note" style={{color:"var(--moss)"}}>✅ Te mandamos un correo con instrucciones para poner una nueva contraseña.</p>}
      <button className="cec-btn cec-btn--primary cec-btn--block" disabled={busy || !email || !password} onClick={entrar}>
        {busy ? "Entrando…" : "Entrar"}
      </button>
      <button className="cec-interes-alt-btn" style={{background:"none", border:"none", color:"var(--ink-soft)", fontSize:"12.5px", textDecoration:"underline", cursor:"pointer", marginTop:"10px"}} onClick={recuperarContrasena} disabled={busy}>
        ¿Olvidaste tu contraseña?
      </button>
      <p className="cec-note" style={{textAlign:"center", marginTop:"18px"}}>
        ¿Quieres vender tus objetos aquí también?<br />
        <a href="mailto:infocasaencasa@gmail.com?subject=Quiero%20vender%20en%20Casa%20en%20Casa&body=Hola%2C%20me%20gustar%C3%ADa%20crear%20mi%20propia%20casa%20para%20vender%20objetos.%20Mi%20correo%20es%3A%20" style={{color:"var(--moss)", fontWeight:600}}>
          Escríbenos a infocasaencasa@gmail.com
        </a>
      </p>
    </div>
    </div>
  );
}

/* ---------- intereses recibidos ---------- */

function InteresesTab({ isAdmin, currentUid }) {
  const [cargando, setCargando] = useState(true);
  const [intereses, setIntereses] = useState([]);
  const [err, setErr] = useState("");

  useEffect(() => {
    (async () => {
      try {
        let query = window.__cecDb.collection("intereses");
        if (!isAdmin) query = query.where("ownerId", "==", currentUid);
        const snap = await query.get();
        const lista = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        setIntereses(lista);
      } catch (e) {
        setErr("No se pudo cargar la lista de intereses.");
      }
      setCargando(false);
    })();
  }, [isAdmin, currentUid]);

  if (cargando) return <p className="cec-note" style={{padding:"20px"}}>Cargando…</p>;
  if (err) return <p className="cec-error-text" style={{padding:"20px"}}>{err}</p>;

  if (intereses.length === 0) {
    return (
      <EmptyState icon="📨" title="Todavía no hay ningún interés"
        hint="Cuando alguien mande sus datos por un objeto publicado, va a aparecer aquí." />
    );
  }

  return (
    <div className="cec-form">
      {intereses.map((it) => (
        <div key={it.id} style={{background:"var(--card)", border:"1px solid var(--paper-line)", borderRadius:"12px", padding:"14px"}}>
          <div style={{fontWeight:600, fontSize:"14.5px", marginBottom:"4px"}}>{it.objetoNombre || "Objeto"}</div>
          <div className="cec-note" style={{marginBottom:"8px"}}>
            {it.casaNombre ? it.casaNombre + " · " : ""}{new Date(it.createdAt).toLocaleString("es-MX")}
          </div>
          <div style={{fontSize:"13.5px", lineHeight:1.6}}>
            <div><strong>{it.nombre}</strong></div>
            <div>✉️ <a href={"mailto:" + it.correo}>{it.correo}</a></div>
            {it.telefono && <div>📞 {it.telefono}</div>}
            {it.mensaje && <div style={{marginTop:"6px", color:"var(--ink-soft)"}}>"{it.mensaje}"</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

  const publicados = objetos.filter((o) => o.publicado && !o.vendido);
  const misCasas = isAdmin ? casas : casas.filter((c) => c.ownerId === currentUid);
  return (
    <div>
      <div className="cec-hero">
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
          <div className="cec-hero-tab">📁</div>
          <button className="cec-btn cec-btn--ghost" style={{fontSize:"12px", padding:"7px 12px"}} onClick={() => window.__cecAuth.signOut()}>Cerrar sesión</button>
        </div>
        <h1>Casa en Casa</h1>
        <p>Tu archivador digital para organizar, fotografiar y dar salida a lo que ya no usas.</p>
      </div>

        <button className={tab === "casas" ? "active" : ""} onClick={onTabCasas}>Mis casas</button>

        <button className={tab === "intereses" ? "active" : ""} onClick={onTabIntereses}>Intereses</button>

      </div>

      {tab === "intereses" && <InteresesTab isAdmin={isAdmin} currentUid={currentUid} />}
      {tab === "solicitudes" && isAdmin && <SolicitudesTab />}

      {tab === "casas" && (
        <div className="cec-list">
          {misCasas.length === 0 ? (
            <EmptyState icon="📁" title="Todavía no tienes ninguna casa" hint="Crea el archivador de tu primera casa para empezar a organizar objetos." actionLabel="Crear una casa" onAction={onNuevaCasa} />
          ) : (
            misCasas.map((c, i) => {
              const total = c.totalObjetos != null ? c.totalObjetos : 0;
              return (
                <button key={c.id} className={`cec-folder-card accent-${ACCENTS[i % ACCENTS.length]}`} onClick={() => onOpenCasa(c.id)}>
                  <span className="cec-folder-tab" />
                  <div className="cec-folder-card-body">
                    <div className="cec-folder-card-title">{c.nombre}</div>
                    <div className="cec-folder-card-sub">{c.zona ? c.zona + " · " : ""}{total} {total === 1 ? "objeto" : "objetos"}</div>
                  </div>
                  <span className="cec-chevron">›</span>
                </button>
              );
            })
          )}
        </div>
      )}

      {tab === "catalogo" && (
        cargando ? (
          <p className="cec-note" style={{padding:"20px"}}>Cargando catálogo…</p>
        ) : (
          <div className="cec-grid">
            {publicados.length === 0 ? (
              <EmptyState icon="🗂️" title="Aún no hay objetos publicados" hint="Cuando publiques un objeto desde su ficha, aparecerá aquí como en un catálogo para compradores." />
            ) : (
              publicados.map((o) => <ObjetoCard key={o.id} objeto={o} onClick={() => onAbrirObjeto(o.id)} />)
            )}
          </div>

      )}

      {tab === "casas" && misCasas.length > 0 && (
        <button className="cec-fab" onClick={onNuevaCasa} aria-label="Crear una casa">+</button>
      )}
    </div>
  );
}

              <span className="cec-cat-label">{cat.label}</span>

        )}

  );

  return (
    <div>
      <Header title={`${info.icon} ${info.label}`} onBack={onBack} />
      <div className="cec-grid">
        {objetos.length === 0 ? (
          <EmptyState icon={info.icon} title="Todavía no hay objetos aquí" hint="Añade el primer objeto de esta categoría." actionLabel="Añadir objeto" onAction={onNuevo} />
        ) : (
          objetos.map((o) => <ObjetoCard key={o.id} objeto={o} onClick={() => onAbrir(o.id)} />)
        )}
      </div>
      {objetos.length > 0 && <button className="cec-fab" onClick={onNuevo} aria-label="Añadir objeto">+</button>}
    </div>
  );
}

function ObjetoCard({ objeto, onClick }) {
  return (
    <button className="cec-obj-card" onClick={onClick}>
      <div className="cec-obj-photo">
        {objeto.foto ? <img src={objeto.foto} alt={objeto.nombre} /> : <span>{categoriaInfo(objeto.categoria).icon}</span>}
        {objeto.vendido && <span className="cec-badge cec-badge--sold">Vendido</span>}
        {!objeto.vendido && objeto.publicado && <span className="cec-badge cec-badge--live">Publicado</span>}
      </div>
      <div className="cec-obj-info">
        <div className="cec-obj-nombre">{objeto.nombre || "Sin nombre"}</div>
        <div className="cec-obj-precio">{formatPrecio(objeto.precio)}</div>
      </div>
    </button>
  );
}

/* ---------- objeto form ---------- */

function ObjetoForm({ categoria, existente, onBack, onGuardar }) {
  const info = categoriaInfo(categoria);
  const esEdicion = !!existente;
  const [foto, setFoto] = useState(existente ? existente.foto || null : null);
  const [nombre, setNombre] = useState(existente ? existente.nombre || "" : "");
  const [subcategoria, setSubcategoria] = useState(existente ? existente.subcategoria || "" : "");
  const [ubicacion, setUbicacion] = useState(existente ? existente.ubicacion || "" : "");
  const [precio, setPrecio] = useState(existente && existente.precio != null ? String(existente.precio) : "");
  const [descripcion, setDescripcion] = useState(existente ? existente.descripcion || "" : "");
  const [unidades, setUnidades] = useState(existente && existente.unidades != null ? String(existente.unidades) : "1");
  const [busy, setBusy] = useState(false);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState("");
  const fileRef = useRef(null);
  const opcionesSub = SUBCATEGORIES[categoria];

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setBusy(true); setErr("");
    try {
      const dataUrl = await compressImage(file);
      setFoto(dataUrl);
    } catch (e) { console.error(e);
      setErr("No se pudo procesar la foto. Intenta con otra imagen.");
    } finally { setBusy(false); }
  }

  function guardar() {
    setSaving(true);
    onGuardar({
      foto,
      nombre: nombre.trim(),
      subcategoria: subcategoria.trim(),
      ubicacion: ubicacion.trim(),
      precio: precio ? Number(precio) : null,
      descripcion: descripcion.trim(),
      unidades: unidades ? Number(unidades) : 1,
    });
  }

  return (
    <div>
      <Header title={esEdicion ? "Editar objeto" : `Añadir a ${info.label}`} onBack={onBack} />
      <div className="cec-form">
        <div className="cec-photo-picker" onClick={() => fileRef.current && fileRef.current.click()}>
          {foto ? <img src={foto} alt="Vista previa" /> : (
            <div className="cec-photo-placeholder"><span>{busy ? "Procesando…" : "📷 Tomar o subir foto"}</span></div>
          )}
          <input ref={fileRef} type="file" accept="image/*" hidden onChange={handleFile} />
        </div>
        {err && <p className="cec-error-text">{err}</p>}

        <label className="cec-field"><span>Nombre del objeto</span>
          <input autoFocus placeholder="Ej. Mesa auxiliar de madera" value={nombre} onChange={(e) => setNombre(e.target.value)} />
        </label>
        <label className="cec-field"><span>Subcategoría</span>
          {opcionesSub ? (
            <select value={subcategoria} onChange={(e) => setSubcategoria(e.target.value)}>
              <option value="">Selecciona una subcategoría</option>
              {opcionesSub.map((s) => <option key={s} value={s}>{s}</option>)}
              <option value="Otra">Otra</option>
            </select>
          ) : (
            <input placeholder="Ej. Mesas auxiliares" value={subcategoria} onChange={(e) => setSubcategoria(e.target.value)} />
          )}
        </label>
        <label className="cec-field"><span>Ubicación en la casa</span>
          <input placeholder="Ej. Sala" value={ubicacion} onChange={(e) => setUbicacion(e.target.value)} />
        </label>
        <label className="cec-field"><span>Precio (MXN)</span>
          <input type="number" inputMode="numeric" placeholder="Ej. 1200" value={precio} onChange={(e) => setPrecio(e.target.value)} />
        </label>
        <label className="cec-field"><span>Descripción</span>
          <textarea rows={3} placeholder="Estado, material, medidas…" value={descripcion} onChange={(e) => setDescripcion(e.target.value)} />
        </label>
        <label className="cec-field"><span>Unidades disponibles</span>
          <input type="number" inputMode="numeric" min="1" placeholder="Ej. 1" value={unidades} onChange={(e) => setUnidades(e.target.value)} />
        </label>

        <button className="cec-btn cec-btn--primary cec-btn--block" disabled={!nombre.trim() || saving} onClick={guardar}>
          {saving ? "Guardando…" : esEdicion ? "Guardar cambios" : "Guardar objeto"}
        </button>
      </div>
    </div>
  );
}

/* ---------- ficha del objeto ---------- */

function ObjetoFicha({ objeto, readOnly, onBack, onUpdate, onDelete, onEditar }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  if (!objeto) {
    return (<div><Header title="Ficha" onBack={onBack} /><EmptyState icon="⚠️" title="Este objeto ya no existe" /></div>);
  }
  const info = categoriaInfo(objeto.categoria);
  return (
    <div>
      <Header title="Ficha del objeto" onBack={onBack} />
      <div className="cec-ficha-photo">
        {objeto.foto ? <img src={objeto.foto} alt={objeto.nombre} /> : (
          <div className="cec-photo-placeholder"><span>{info.icon}</span></div>
        )}
        {objeto.vendido && <span className="cec-badge cec-badge--sold cec-badge--float">Vendido</span>}
        {!objeto.vendido && objeto.publicado && <span className="cec-badge cec-badge--live cec-badge--float">Publicado</span>}
      </div>
      <div className="cec-ficha-body">
        <div className="cec-eyebrow">{info.icon} {info.label}{objeto.subcategoria ? ` · ${objeto.subcategoria}` : ""}</div>
        <h2 className="cec-ficha-nombre">{objeto.nombre || "Sin nombre"}</h2>
        <div className="cec-ficha-precio">{formatPrecio(objeto.precio)}</div>

        {objeto.ubicacion && <div className="cec-ficha-row"><span>Ubicación</span><span>{objeto.ubicacion}</span></div>}
        {objeto.descripcion && <div className="cec-ficha-block"><span className="cec-ficha-block-label">Descripción</span><p>{objeto.descripcion}</p></div>}
        {objeto.unidades != null && <div className="cec-ficha-row"><span>Unidades disponibles</span><span>{objeto.unidades}</span></div>}

        {!readOnly && (
          <div className="cec-ficha-actions">
            <button className="cec-btn cec-btn--ghost cec-btn--block" onClick={onEditar}>
              ✏️ Editar objeto
            </button>
            <button className={`cec-btn ${objeto.publicado ? "cec-btn--ghost" : "cec-btn--primary"} cec-btn--block`}
              onClick={() => onUpdate({ publicado: !objeto.publicado })} disabled={objeto.vendido}>
              {objeto.publicado ? "Quitar de publicados" : "Publicar objeto"}
            </button>
            <button className="cec-btn cec-btn--ghost cec-btn--block" onClick={() => onUpdate({ vendido: !objeto.vendido })}>
              {objeto.vendido ? "Marcar como disponible" : "Marcar como vendido"}
            </button>
            {!confirmDelete ? (
              <button className="cec-link-danger" onClick={() => setConfirmDelete(true)}>Eliminar objeto</button>
            ) : (
              <div className="cec-confirm">
                <span>¿Eliminar "{objeto.nombre}"?</span>
                <div>
                  <button className="cec-btn cec-btn--ghost" onClick={() => setConfirmDelete(false)}>Cancelar</button>
                  <button className="cec-btn cec-btn--danger" onClick={onDelete}>Eliminar</button>
                </div>
              </div>
            )}
          </div>
        )}
        {readOnly && <p className="cec-note">Estás viendo esta ficha como la vería un comprador en el catálogo.</p>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<div className="cec-app"><CasaEnCasa /></div>);
